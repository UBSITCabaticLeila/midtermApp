@if (product) {
    <div class="detail-container">
      <div class="detail-header">
        <h2>Product Details</h2>
        <button class="btn-back" (click)="goBack()">← Back</button>
      </div>
      <form class="detail-form">
        <div class="form-row">
          <div class="form-group">
            <label>Product ID</label>
            <input type="text" [(ngModel)]="product.id" name="id" readonly class="form-input readonly"/>
          </div>
          <div class="form-group">
            <label>Name</label>
            <input type="text" [(ngModel)]="product.name" name="name" class="form-input"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Brand</label>
            <input type="text" [(ngModel)]="product.brand" name="brand" class="form-input"/>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" [(ngModel)]="product.category" name="category" class="form-input"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price (₱)</label>
            <input type="number" [(ngModel)]="product.price" name="price" class="form-input"/>
          </div>
          <div class="form-group">
            <label>Stock</label>
            <input type="number" [(ngModel)]="product.stock" name="stock" class="form-input"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Status</label>
            <select [(ngModel)]="product.status" name="status" class="form-input">
              <option>Available</option>
              <option>Out of Stock</option>
              <option>Limited</option>
            </select>
          </div>
          <div class="form-group">
            <label>Rating</label>
            <input type="number" [(ngModel)]="product.rating" name="rating" min="0" max="5" step="0.1" class="form-input"/>
          </div>
        </div>
        <div class="form-group full-width">
          <label>Description</label>
          <textarea [(ngModel)]="product.description" name="description" class="form-input" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-save" (click)="saveProduct()">Save Changes</button>
          <button type="button" class="btn-back" (click)="goBack()">Cancel</button>
        </div>
      </form>
    </div>
  }
