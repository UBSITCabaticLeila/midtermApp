<div class="products-container">
  <h2>Product List</h2>

  <div class="search-bar">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (input)="search()"
      placeholder="Search by name or ID..."
      class="search-input"
    />
  </div>

  <table class="products-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (product of filteredProducts; track product.id) {
        <tr>
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
          <td>
            <span class="status-badge" [class]="'status-' + product.status.toLowerCase().replace(' ', '-')">
              {{ product.status }}
            </span>
          </td>
          <td>
            <a [routerLink]="['/product', product.id, 'details']" class="btn-view">View</a>
            <button class="btn-delete" (click)="onDelete(product.id)">Delete</button>
          </td>
        </tr>
      }
      @if (filteredProducts.length === 0) {
        <tr>
          <td colspan="4" style="text-align: center; padding: 20px; color: #999;">No products found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
