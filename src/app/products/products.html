<div class="products-container">
  <h2>Product List</h2>

  <table class="products-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (product of products; track product.id) {
        <tr>
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
          <td>
            <span class="status-badge" [class]="'status-' + product.status.toLowerCase().replace(' ', '-')">
              {{ product.status }}
            </span>
          </td>
          <td>
            <a [routerLink]="[product.id, 'details']" class="btn-view">View</a>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

<hr/>
<!-- ProductDetails renders here (nested route) -->
<div class="container mt-4">
  <router-outlet></router-outlet>
</div>
