<div class="products-container">
  <h2>Product List</h2>

  <div class="search-bar">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (input)="search()"
      placeholder="Search by name or ID..."
      class="search-input"
    />
    <button class="btn-add" (click)="toggleAddForm()">
      {{ showAddForm ? 'Cancel' : '+ Add Product' }}
    </button>
  </div>

  @if (showAddForm) {
    <div class="add-form">
      <h3>Add New Product</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input [(ngModel)]="newProduct.name" name="name" class="form-input" placeholder="Product name" />
        </div>
        <div class="form-group">
          <label>Brand</label>
          <input [(ngModel)]="newProduct.brand" name="brand" class="form-input" placeholder="Brand" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <input [(ngModel)]="newProduct.category" name="category" class="form-input" placeholder="Category" />
        </div>
        <div class="form-group">
          <label>Price (₱)</label>
          <input type="number" [(ngModel)]="newProduct.price" name="price" class="form-input" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Stock</label>
          <input type="number" [(ngModel)]="newProduct.stock" name="stock" class="form-input" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="newProduct.status" name="status" class="form-input">
            <option>Available</option>
            <option>Out of Stock</option>
            <option>Limited</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="newProduct.description" name="description" class="form-input" rows="2"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-save" (click)="onSave()">Save</button>
        <button class="btn-cancel" (click)="toggleAddForm()">Cancel</button>
      </div>
    </div>
  }

  <table class="products-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (product of filteredProducts; track product.id) {
        <tr>
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
          <td>
            <span class="status-badge" [class]="'status-' + product.status.toLowerCase().replace(' ', '-')">
              {{ product.status }}
            </span>
          </td>
          <td>
            <a [routerLink]="[product.id, 'details']" class="btn-view" (click)="scrollToDetails()">View</a>
            <button class="btn-delete" (click)="onDelete(product.id)">Delete</button>
          </td>
        </tr>
      }
      @if (filteredProducts.length === 0) {
        <tr>
          <td colspan="4" style="text-align: center; padding: 20px; color: #999;">No products found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>

<div id="details-section">
  <router-outlet></router-outlet>
</div>
